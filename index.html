<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Use viewport-fit=cover with safe area fallback -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="description" content="Dragon Flight is a fun, challenging Flappy Bird-style game. Fly your dragon through pipes, choose skins and difficulty, and compete on the leaderboard!" />
  <meta name="theme-color" content="#71C5CF" />
  <!-- Open Graph tags for social sharing -->
  <meta property="og:title" content="Dragon Flight - Kodex" />
  <meta property="og:description" content="Fly your dragon through pipes! Choose skins, difficulty, and compete on the leaderboard." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://14spartan117.github.io/Flappy-Birds/" />
  <!-- Inline SVG favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐉</text></svg>" />
  <title>Dragon Flight - Kodex</title>
  <style>
    :root {
      /* Default safe-area insets */
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }
    /* Combo display */
    #combo-display {
      position: absolute;
      top: calc(70px + var(--safe-top));
      width: 100%;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
      color: #FFD700;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
      z-index: 10;
      pointer-events: none;
    }
    /* FPS counter */
    #fps-counter {
      position: absolute;
      bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      right: calc(10px + var(--safe-right));
      z-index: 40;
      background: rgba(0,0,0,0.5);
      color: #0f0;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 13px;
      font-family: monospace;
      display: none;
    }
    /* Stats display on game over */
    #stats-display {
      margin-top: 8px;
      font-size: 14px;
      color: #ccc;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      box-sizing: border-box;
    }
    body {
      padding-top: var(--safe-top);
      padding-bottom: env(safe-area-inset-bottom, 0px);
      font-family: Arial, sans-serif;
      overflow: hidden;
      background-color: #71C5CF;
      touch-action: manipulation;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    /* Game container covers full viewport */
    #game-container {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }
    /* Canvas fills container */
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
      z-index: 0;
    }
    /* Top UI elements use our safe-area variables */
    #score-display {
      position: absolute;
      top: calc(20px + var(--safe-top));
      width: 100%;
      text-align: center;
      font-size: 40px;
      font-weight: bold;
      color: white;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
      z-index: 10;
    }
    #leaderboard {
      position: absolute;
      top: calc(20px + var(--safe-top));
      left: calc(20px + var(--safe-left));
      z-index: 40;
      background: rgba(0,0,0,0.5);
      color: white;
      padding: 10px;
      border-radius: 5px;
      font-size: 16px;
      max-width: 200px;
    }
    #start-high-score {
      font-size: 20px;
      margin: 5px 0 0 0;
    }
    /* Reduced start message size and padding */
    #start-message {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-size: 28px;
      font-weight: bold;
      color: white;
      background-color: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 10px;
      z-index: 20;
    }
    #achievement-notification {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 36px;
      color: yellow;
      text-shadow: 2px 2px 4px #000;
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
      z-index: 50;
    }
    #achievement-notification.visible {
      opacity: 1;
    }
    /* Game over sign remains at 40% */
    #game-over {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-size: 30px;
      font-weight: bold;
      color: white;
      background-color: rgba(0,0,0,0.7);
      padding: 20px;
      border-radius: 10px;
      display: none;
      z-index: 30;
    }
    #game-over button {
      margin-top: 10px;
      padding: 10px 20px;
      font-size: 20px;
      background-color: #27ae60;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #high-score {
      margin-top: 10px;
      font-size: 20px;
    }
    /* Pause button using our safe-area variables */
    #pause-button {
      position: absolute;
      top: calc(20px + var(--safe-top));
      right: calc(20px + var(--safe-right));
      z-index: 40;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }
    /* Bottom controls container – moved up */
    #bottom-controls {
      position: absolute;
      bottom: calc(150px + env(safe-area-inset-bottom, 0px));
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: flex-end;
      max-width: calc(100% - 20px);
      gap: 10px;
      padding: 5px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 5px;
    }
    /* Bottom selection groups – reduced text and button sizes */
    #mode-selection, #difficulty-selection, #skin-selection {
      text-align: center;
      color: white;
    }
    #mode-selection h2,
    #difficulty-selection h2,
    #skin-selection h2 {
      font-size: 14px;
      margin-bottom: 3px;
      text-shadow: 1px 1px 2px #000;
    }
    .mode-buttons,
    .difficulty-buttons,
    .skin-buttons {
      display: flex;
      justify-content: center;
      gap: 5px;
    }
    .mode-btn,
    .difficulty-btn,
    .skin-btn {
      padding: 5px 10px;
      font-size: 12px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background-color: #ccc;
    }
    .mode-btn.selected,
    .difficulty-btn.selected,
    .skin-btn.selected {
      background-color: #27ae60;
      color: white;
    }
    /* Mute button */
    #mute-button {
      position: absolute;
      top: calc(20px + var(--safe-top));
      right: calc(70px + var(--safe-right));
      z-index: 40;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }
    /* 10. Hover/focus styles for buttons */
    .mode-btn:hover, .difficulty-btn:hover, .skin-btn:hover {
      filter: brightness(1.2);
    }
    .mode-btn:focus, .difficulty-btn:focus, .skin-btn:focus {
      outline: 2px solid #fff;
      filter: brightness(1.2);
    }
    #game-over button:hover {
      filter: brightness(1.2);
      background-color: #2ecc71;
    }
    #game-over button:focus {
      outline: 2px solid #fff;
      filter: brightness(1.2);
    }
    #pause-button:hover, #mute-button:hover {
      background: rgba(0,0,0,0.7);
    }
    #pause-button:focus, #mute-button:focus {
      outline: 2px solid #fff;
      background: rgba(0,0,0,0.7);
    }
    /* 5. Name input modal */
    #name-input-modal {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 60;
    }
    #name-input-modal.visible {
      display: flex;
    }
    #name-input-modal .modal-content {
      background: #333;
      padding: 20px;
      border-radius: 10px;
      text-align: center;
      color: white;
    }
    #name-input-modal input {
      padding: 8px;
      font-size: 16px;
      border-radius: 5px;
      border: none;
      margin: 10px 0;
      width: 200px;
    }
    #name-input-modal button {
      padding: 8px 20px;
      font-size: 16px;
      background-color: #27ae60;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      margin: 5px;
    }
    #name-input-modal button:hover {
      filter: brightness(1.2);
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="score-display" aria-live="polite">0</div>
    <div id="combo-display"></div>
    <div id="fps-counter">FPS: --</div>
    <div id="leaderboard">
      <strong>Leaderboard</strong>
      <div id="leaderboard-list"></div>
    </div>
    <div id="achievement-notification" aria-live="polite"></div>
    <div id="start-message">Tap or press ↑ to Start and Flap!<p id="start-high-score"></p></div>
    
    <!-- Bottom Controls: Mode, Difficulty, and Skin Selections -->
    <div id="bottom-controls">
      <div id="mode-selection">
        <h2>Select Mode</h2>
        <div class="mode-buttons">
          <button id="classic-btn" class="mode-btn selected" aria-label="Classic mode">Classic</button>
          <button id="challenge-btn" class="mode-btn" aria-label="Challenge mode">Challenge</button>
        </div>
      </div>
      <div id="difficulty-selection">
        <h2>Select Difficulty</h2>
        <div class="difficulty-buttons">
          <button id="easy-btn" class="difficulty-btn" aria-label="Easy difficulty">Easy</button>
          <button id="medium-btn" class="difficulty-btn selected" aria-label="Medium difficulty">Medium</button>
          <button id="hard-btn" class="difficulty-btn" aria-label="Hard difficulty">Hard</button>
        </div>
      </div>
      <div id="skin-selection">
        <h2>Select Dragon Skin</h2>
        <div class="skin-buttons">
          <button id="red-skin-btn" class="skin-btn selected" aria-label="Red dragon skin">Red</button>
          <button id="blue-skin-btn" class="skin-btn" aria-label="Blue dragon skin">Blue</button>
          <button id="green-skin-btn" class="skin-btn" aria-label="Green dragon skin">Green</button>
          <button id="pink-skin-btn" class="skin-btn" aria-label="Pink dragon skin">Pink</button>
          <button id="gold-skin-btn" class="skin-btn" aria-label="Gold dragon skin">Gold</button>
          <button id="silver-skin-btn" class="skin-btn" aria-label="Silver dragon skin">Silver</button>
        </div>
      </div>
    </div>
    
    <div id="game-over">
      Game Over!
      <div id="medal-display"></div>
      <div id="final-score">Score: 0</div>
      <div id="high-score">High Score: 0</div>
      <div id="stats-display"></div>
      <button id="restart-button" aria-label="Restart game">Restart</button>
      <button id="share-button" aria-label="Share score">Share Score</button>
    </div>
    <div id="name-input-modal">
      <div class="modal-content">
        <h2>Game Over!</h2>
        <p>Enter your name for the leaderboard:</p>
        <input type="text" id="player-name-input" maxlength="20" placeholder="Your name" aria-label="Player name" />
        <br>
        <button id="name-submit-btn" aria-label="Submit name">Submit</button>
        <button id="name-skip-btn" aria-label="Skip name entry">Skip</button>
      </div>
    </div>
    <div id="mute-button" role="button" aria-label="Toggle mute" tabindex="0">🔊</div>
    <div id="pause-button" role="button" aria-label="Pause game" tabindex="0">Pause</div>
    <canvas id="game-canvas"></canvas>
  </div>
  
  <script>
    // If hosted on GitHub, override safe-area variables and adjust container height.
    if (window.location.host.includes("github")) {
      document.documentElement.style.setProperty('--safe-top', '80px');
      document.documentElement.style.setProperty('--safe-left', '20px');
      document.documentElement.style.setProperty('--safe-right', '20px');
      const gameContainer = document.getElementById('game-container');
      if (gameContainer) {
        // Subtract 80px (or adjust as needed) to account for GitHub's header
        gameContainer.style.height = "calc(100vh - 80px)";
      }
    }
    
      // --- Sound Effects using Web Audio API ---
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      let audioCtx;
      let muted = false;
      function ensureAudioCtx() {
        if (!audioCtx) audioCtx = new AudioCtx();
        return audioCtx;
      }

      function playFlapSound() {
        if (muted) return;
        const ctx = ensureAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.15);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.15);
      }

      function playScoreSound() {
        if (muted) return;
        const ctx = ensureAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(523, ctx.currentTime);
        osc.frequency.setValueAtTime(659, ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.25);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.25);
      }

      function playGameOverSound() {
        if (muted) return;
        const ctx = ensureAudioCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(300, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.5);
        gain.gain.setValueAtTime(0.15, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.5);
      }

      document.addEventListener('DOMContentLoaded', () => {
      const canvas = document.getElementById('game-canvas');
      const ctx = canvas.getContext('2d');
      const scoreDisplay = document.getElementById('score-display');
      const startMessage = document.getElementById('start-message');
      const gameOverMessage = document.getElementById('game-over');
      const finalScore = document.getElementById('final-score');
      const highScoreDisplay = document.getElementById('high-score');
      const restartButton = document.getElementById('restart-button');
      const pauseButton = document.getElementById('pause-button');
      const muteButton = document.getElementById('mute-button');
      const leaderboardList = document.getElementById('leaderboard-list');
      const achievementNotification = document.getElementById('achievement-notification');
      const nameInputModal = document.getElementById('name-input-modal');
      const playerNameInput = document.getElementById('player-name-input');
      const nameSubmitBtn = document.getElementById('name-submit-btn');
      const nameSkipBtn = document.getElementById('name-skip-btn');
      const startHighScore = document.getElementById('start-high-score');
  
      // Mode selection buttons
      const classicBtn = document.getElementById('classic-btn');
      const challengeBtn = document.getElementById('challenge-btn');
  
      // Difficulty selection buttons
      const easyBtn = document.getElementById('easy-btn');
      const mediumBtn = document.getElementById('medium-btn');
      const hardBtn = document.getElementById('hard-btn');
  
      // Skin selection buttons
      const redSkinBtn = document.getElementById('red-skin-btn');
      const blueSkinBtn = document.getElementById('blue-skin-btn');
      const greenSkinBtn = document.getElementById('green-skin-btn');
      const pinkSkinBtn = document.getElementById('pink-skin-btn');
      const goldSkinBtn = document.getElementById('gold-skin-btn');
      const silverSkinBtn = document.getElementById('silver-skin-btn');
  
      // Set canvas size
      function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        if (birdInitialized) {
          bird.x = canvas.width / 4;
          if (!gameStarted) bird.y = canvas.height / 2;
        }
      }
      let birdInitialized = false;
      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
  
      // Named constants
      const GROUND_HEIGHT = 100;
      const PARTICLE_COUNT = 20;
      const PARTICLE_FADE_RATE = 0.02;
      const CLOUD_COUNT = 3;
      const DAY_NIGHT_CYCLE_SPEED = 5000;
      const COUNTDOWN_SECONDS = 3;
      const TARGET_FRAME_MS = 16.67;
      const MAX_DT_MULTIPLIER = 3;
      const LEADERBOARD_MAX_ENTRIES = 10;
      const DEFAULT_PLAYER_NAME = 'Anonymous';

      // Game variables
      const gravity = 0.5;
      const jumpForce = -10;
      const basePipeWidth = 80;
  
      // Difficulty settings
      const difficulties = {
        Easy: { pipeGap: 250, pipeSpawnRate: 2200 },
        Medium: { pipeGap: 200, pipeSpawnRate: 1800 },
        Hard: { pipeGap: 150, pipeSpawnRate: 1200 }
      };
  
      let selectedDifficulty = difficulties.Medium;
      let gameMode = "Classic";
      let selectedSkin = "red";
  
      let pipeGap = selectedDifficulty.pipeGap;
      let pipeSpawnRate = selectedDifficulty.pipeSpawnRate;
      let pipeSpeed = (gameMode === "Challenge" ? 4.5 : 3);
  
      let highScore = 0;
      try {
        highScore = localStorage.getItem('highScore') || 0;
      } catch (e) {
        highScore = 0;
      }
      highScoreDisplay.innerText = `High Score: ${highScore}`;
  
      let score = 0;
      let gameStarted = false;
      let gameRunning = false;
      let lastPipeTime = 0;
      let paused = false;
      let countdownActive = false;
      let lastFrameTime = performance.now();

      // --- Feature 1: Screen Shake ---
      let shakeTimer = 0;
      let shakeIntensity = 0;
      const SHAKE_DURATION = 300; // ms
      const SHAKE_MAX_INTENSITY = 8;

      // --- Feature 2: Wing Flap Timer ---
      let wingTimer = 0;

      // --- Feature 4: Combo Scoring ---
      let comboCount = 0;
      let lastScoreTime = 0;
      const COMBO_WINDOW_MS = 2000;
      const comboDisplay = document.getElementById('combo-display');

      // --- Feature 5: Ghost/Best Run Trail ---
      let bestRunPositions = [];
      let currentRunPositions = [];
      let ghostRecordInterval = null;

      // --- Feature 6: Floating Score Popups ---
      const scorePopups = [];

      // --- Feature 8: Dragon Fire Particles ---
      const fireParticles = [];

      // --- Feature 9: Twinkling Stars ---
      const stars = [];
      (function initStars() {
        for (let i = 0; i < 80; i++) {
          stars.push({
            x: Math.random(),
            y: Math.random() * 0.7,
            radius: Math.random() * 1.5 + 0.5,
            phase: Math.random() * Math.PI * 2,
            speed: Math.random() * 2 + 1
          });
        }
      })();

      // --- Feature 10: Camera Follow ---
      let cameraOffsetY = 0;

      // --- Feature 14: FPS Counter ---
      let showFPS = false;
      let fpsValue = 0;
      const fpsCounter = document.getElementById('fps-counter');

      // --- Feature 15: Stats Tracking ---
      let statsData = { totalGames: 0, totalScore: 0, bestStreak: 0 };
      try {
        const saved = localStorage.getItem('dragonStats');
        if (saved) statsData = Object.assign(statsData, JSON.parse(saved));
      } catch (e) { /* storage unavailable */ }

      function saveStats() {
        try { localStorage.setItem('dragonStats', JSON.stringify(statsData)); } catch (e) {}
      }

      const particles = [];

      // --- Feature 24: Confetti for high score ---
      const confettiParticles = [];
      const CONFETTI_COLORS = ['#FFD700','#FF4500','#00BFFF','#7FFF00','#FF69B4','#FF6347'];
      function spawnConfetti() {
        for (let i = 0; i < 60; i++) {
          confettiParticles.push({
            x: Math.random() * canvas.width,
            y: -10,
            vx: (Math.random() - 0.5) * 4,
            vy: Math.random() * 3 + 1,
            width: Math.random() * 10 + 5,
            height: Math.random() * 6 + 3,
            rotation: Math.random() * Math.PI * 2,
            rotSpeed: (Math.random() - 0.5) * 0.2,
            color: CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)],
            alpha: 1
          });
        }
      }
      function updateConfetti(dt) {
        for (let i = confettiParticles.length - 1; i >= 0; i--) {
          const p = confettiParticles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.rotation += p.rotSpeed * dt;
          p.alpha -= 0.008 * dt;
          if (p.alpha <= 0 || p.y > canvas.height + 20) confettiParticles.splice(i, 1);
        }
      }
      function drawConfetti() {
        confettiParticles.forEach(p => {
          if (p.alpha <= 0) return;
          ctx.save();
          ctx.globalAlpha = Math.max(0, p.alpha);
          ctx.fillStyle = p.color;
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rotation);
          ctx.fillRect(-p.width / 2, -p.height / 2, p.width, p.height);
          ctx.restore();
        });
      }

      // --- Feature 23: Speed lines behind bird ---
      const speedLines = [];
      function updateSpeedLines(dt) {
        if (gameRunning && Math.abs(bird.velocity) > 4) {
          for (let i = 0; i < 2; i++) {
            speedLines.push({
              x: bird.x - 20 + (Math.random() - 0.5) * bird.width,
              y: bird.y + cameraOffsetY + (Math.random() - 0.5) * bird.height,
              length: Math.random() * 20 + 10,
              alpha: 0.5,
              speed: Math.random() * 2 + 2
            });
          }
        }
        for (let i = speedLines.length - 1; i >= 0; i--) {
          const l = speedLines[i];
          l.x -= l.speed * dt;
          l.alpha -= 0.06 * dt;
          if (l.alpha <= 0) speedLines.splice(i, 1);
        }
      }
      function drawSpeedLines() {
        speedLines.forEach(l => {
          if (l.alpha <= 0) return;
          ctx.save();
          ctx.globalAlpha = l.alpha;
          ctx.strokeStyle = 'rgba(255,255,255,0.8)';
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(l.x, l.y);
          ctx.lineTo(l.x - l.length, l.y);
          ctx.stroke();
          ctx.restore();
        });
      }
  
      const achievements = [
        { score: 1, message: "First Flap!" },
        { score: 10, message: "Nice! 10 points!" },
        { score: 25, message: "Great! 25 points!" },
        { score: 50, message: "Amazing! 50 points!" },
        { score: 100, message: "Unstoppable! 100 points!" }
      ];
      const unlockedAchievements = new Set();
  
      function showAchievement(message) {
        achievementNotification.innerText = message;
        achievementNotification.classList.add('visible');
        setTimeout(() => { achievementNotification.classList.remove('visible'); }, 2000);
      }
  
      function checkAchievements(currentScore) {
        achievements.forEach(ach => {

      const skins = {
        red:    { body: '#CC0000', wing: '#AA0000', head: '#CC0000', snout: '#AA0000', eye: '#FFFF00' },
        blue:   { body: '#0000CC', wing: '#0000AA', head: '#0000CC', snout: '#000099', eye: '#FFFFFF' },
        green:  { body: '#00CC00', wing: '#00AA00', head: '#00CC00', snout: '#009900', eye: '#FFFF00' },
        pink:   { body: '#FF69B4', wing: '#FF1493', head: '#FF69B4', snout: '#FF1493', eye: '#FFFFFF' },
        gold:   { body: '#FFD700', wing: '#FFA500', head: '#FFD700', snout: '#FFA500', eye: '#8B0000' },
        silver: { body: '#C0C0C0', wing: '#A0A0A0', head: '#C0C0C0', snout: '#909090', eye: '#000080' }

      const bird = {
        x: canvas.width / 4,
        y: canvas.height / 2,
        width: 50,
        height: 40,
        velocity: 0,
        draw(ghost) {
          const skin = ghost ? { body: 'rgba(200,220,255,0.35)', wing: 'rgba(180,200,255,0.25)', head: 'rgba(200,220,255,0.35)', snout: 'rgba(180,200,255,0.25)', eye: 'rgba(255,255,255,0.4)' } : skins[selectedSkin];
          // --- Feature 2: velocity-based wing angle ---
          const wingAngle = Math.max(-0.5, Math.min(0.5, this.velocity * 0.05));
          const wingSin = Math.sin(wingTimer * 0.15) * 0.3;
          const wUp = wingAngle - wingSin;   // upper wing offset
          const wDn = wingAngle + wingSin;   // lower wing offset

          // --- Feature 17: Bird tilt/rotation based on velocity ---
          const tiltAngle = Math.max(-0.4, Math.min(0.7, this.velocity * 0.06));

            ctx.save();
            ctx.globalAlpha = 0.22;
            ctx.fillStyle = '#000';

            ctx.ellipse(4, 6, this.width / 2, this.height / 2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();

          // Draw body (centered at 0,0 in rotated space)
          ctx.fillStyle = skin.body;
          ctx.beginPath();
          ctx.ellipse(0, 0, this.width / 2, this.height / 2, 0, 0, Math.PI * 2);
          ctx.fill();

          ctx.fillStyle = skin.wing;

          ctx.beginPath();
          ctx.moveTo(0, 5);
          ctx.lineTo(-20, 25 + wDn * 20);
          ctx.lineTo(-5, 15 + wDn * 10);
          ctx.closePath();
          ctx.fill();
          // Draw head and eye
          ctx.fillStyle = skin.head;
          ctx.beginPath();
          ctx.arc(15, -5, 12, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = skin.eye;
          ctx.beginPath();
          ctx.arc(18, -8, 4, 0, Math.PI * 2);
          ctx.fill();
          if (!ghost) {
            ctx.fillStyle = '#000000';
            ctx.beginPath();
            ctx.arc(18, -8, 2, 0, Math.PI * 2);

          }
          // Draw snout
          ctx.fillStyle = skin.snout;
          ctx.beginPath();
          ctx.moveTo(25, -5);
          ctx.lineTo(40, 0);
          ctx.lineTo(25, 3);
          ctx.closePath();
          ctx.fill();
          // Draw tail
          ctx.fillStyle = skin.snout;
          ctx.beginPath();
          ctx.moveTo(-20, 0);
          ctx.lineTo(-35, -10);
          ctx.lineTo(-35, 10);
          ctx.closePath();
          ctx.fill();

          ctx.restore();
        },
        update(dt) {
          this.velocity += gravity * dt;
          this.y += this.velocity * dt;
          if (this.y + this.height / 2 > canvas.height - GROUND_HEIGHT) {

          if (this.y - this.height / 2 < 0) {

        },
        flap() {

        }
      };
      birdInitialized = true;
  
      // --- Feature 11: Pipe color based on score ---
      function getPipeColor(currentScore) {
        if (currentScore >= 50) return { body: '#C0392B', cap: '#962d22' };
        if (currentScore >= 25) return { body: '#8E44AD', cap: '#6c3483' };
        if (currentScore >= 10) return { body: '#2980B9', cap: '#1a6391' };
        return { body: '#75B91A', cap: '#5A9117' };
      }

      function Pipe(x) {
        this.x = x;
        this.width = basePipeWidth;
        this.scored = false;
        const minGapY = pipeGap + GROUND_HEIGHT;
        const maxGapY = canvas.height - pipeGap - 2 * GROUND_HEIGHT;
        this.gapY = Math.random() * (maxGapY - minGapY) + minGapY;

        this.draw = function() {
          const colors = getPipeColor(score);
          // --- Feature 18: Pipe proximity warning ---
          const distToPipe = Math.abs(bird.x - (this.x + this.width / 2));
          const warnThreshold = 120;
          let bodyColor = colors.body;
          let capColor = colors.cap;
          if (distToPipe < warnThreshold && gameRunning) {
            const warnRatio = 1 - distToPipe / warnThreshold;
            const flash = Math.sin(Date.now() * 0.015) * 0.5 + 0.5;
            const warnAlpha = warnRatio * flash * 0.5;
            ctx.save();
            ctx.fillStyle = colors.body;
            ctx.fillRect(this.x, 0, this.width, this.gapY - pipeGap / 2);
            ctx.fillRect(this.x, this.gapY + pipeGap / 2, this.width, canvas.height - (this.gapY + pipeGap / 2) - GROUND_HEIGHT);
            ctx.fillStyle = colors.cap;
            ctx.fillRect(this.x - 5, this.gapY - pipeGap / 2 - 20, this.width + 10, 20);
            ctx.fillRect(this.x - 5, this.gapY + pipeGap / 2, this.width + 10, 20);
            ctx.globalAlpha = warnAlpha;
            ctx.fillStyle = '#FF4500';
            ctx.fillRect(this.x, 0, this.width, this.gapY - pipeGap / 2);
            ctx.fillRect(this.x, this.gapY + pipeGap / 2, this.width, canvas.height - (this.gapY + pipeGap / 2) - GROUND_HEIGHT);
            ctx.fillRect(this.x - 5, this.gapY - pipeGap / 2 - 20, this.width + 10, 20);
            ctx.fillRect(this.x - 5, this.gapY + pipeGap / 2, this.width + 10, 20);
            ctx.restore();
          } else {
            ctx.fillStyle = bodyColor;
            ctx.fillRect(this.x, 0, this.width, this.gapY - pipeGap / 2);
            ctx.fillRect(this.x, this.gapY + pipeGap / 2, this.width, canvas.height - (this.gapY + pipeGap / 2) - GROUND_HEIGHT);
            ctx.fillStyle = capColor;
            ctx.fillRect(this.x - 5, this.gapY - pipeGap / 2 - 20, this.width + 10, 20);
            ctx.fillRect(this.x - 5, this.gapY + pipeGap / 2, this.width + 10, 20);
          }
          // --- Feature 25: Pipe gap center marker ---
          ctx.save();
          ctx.globalAlpha = 0.35;
          ctx.fillStyle = 'rgba(255,255,255,0.6)';
          ctx.beginPath();
          ctx.arc(this.x + this.width / 2, this.gapY, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        };

        this.update = function(dt) {
          this.x -= pipeSpeed * dt;
          if (!this.scored && this.x + this.width < bird.x) {
            this.scored = true;

            // --- Feature 4: Combo scoring ---
            const now = Date.now();
            if (now - lastScoreTime <= COMBO_WINDOW_MS) {
              comboCount++;
            } else {
              comboCount = 1;
            }
            lastScoreTime = now;

            // Determine multiplier
            let multiplier = 1;
            if (comboCount >= 5) multiplier = 3;
            else if (comboCount >= 3) multiplier = 2;

            score += multiplier;
            scoreDisplay.innerText = score;

            // Update combo display
            if (comboCount >= 3) {
              comboDisplay.innerText = `Combo x${multiplier}! (${comboCount})`;
              comboDisplay.style.opacity = '1';
            } else {
              comboDisplay.innerText = '';
            }

            // --- Feature 6: Floating score popup ---
            scorePopups.push({
              x: this.x + this.width / 2,
              y: this.gapY + cameraOffsetY,
              text: multiplier > 1 ? `+${multiplier}` : '+1',
              alpha: 1,
              vy: -1.5
            });

            // --- Feature 3: Progressive difficulty scaling ---
            if (score % 10 === 0) {
              const basePipeSpeed = (gameMode === "Challenge" ? 4.5 : 3);
              const maxPipeSpeed = basePipeSpeed + 3;
              pipeSpeed = Math.min(pipeSpeed + 0.15, maxPipeSpeed);
              const minGap = 80;
              pipeGap = Math.max(pipeGap - 2, minGap);
            }

            // --- Feature 8: Dragon fire breathing ---
            spawnFireParticles(bird.x + 40, bird.y + cameraOffsetY);

            checkAchievements(score);

          if (
            bird.x + bird.width / 2 > this.x &&
            bird.x - bird.width / 2 < this.x + this.width &&
            (bird.y - bird.height / 2 < this.gapY - pipeGap / 2 ||
             bird.y + bird.height / 2 > this.gapY + pipeGap / 2)
          ) {

        };
      }
  
      const pipes = [];
  
      function updateGameParameters() {
        pipeSpeed = (gameMode === "Challenge" ? 4.5 : 3);
        pipeGap = (gameMode === "Challenge" ? selectedDifficulty.pipeGap * 0.8 : selectedDifficulty.pipeGap);
        pipeSpawnRate = (gameMode === "Challenge" ? selectedDifficulty.pipeSpawnRate * 0.8 : selectedDifficulty.pipeSpawnRate);
      }
  
      // --- Feature 7: Parallax layers state ---
      let parallaxOffset1 = 0; // mountains (slow)
      let parallaxOffset2 = 0; // bushes (medium)
      let groundOffset = 0;    // ground (fast)

      function drawBackground() {
        const dayColor = { r: 113, g:197, b:207 };
        const nightColor = { r:0, g:31, b:63 };
        const t = (Math.sin(Date.now() / DAY_NIGHT_CYCLE_SPEED) + 1) / 2;
        const r = Math.floor(dayColor.r * t + nightColor.r * (1-t));
        const g = Math.floor(dayColor.g * t + nightColor.g * (1-t));
        const b = Math.floor(dayColor.b * t + nightColor.b * (1-t));
        ctx.fillStyle = `rgb(${r}, ${g}, ${b})`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // --- Feature 9: Twinkling stars at night ---
        if (t < 0.5) {
          const starAlpha = Math.max(0, 1 - t * 2);
          stars.forEach(star => {
            const twinkle = (Math.sin(Date.now() * 0.001 * star.speed + star.phase) + 1) / 2;
            ctx.fillStyle = `rgba(255,255,255,${starAlpha * (0.4 + twinkle * 0.6)})`;
            ctx.beginPath();
            ctx.arc(star.x * canvas.width, star.y * canvas.height, star.radius, 0, Math.PI * 2);
            ctx.fill();
          });
        }

        // --- Feature 21: Sun and Moon celestial body ---
        const celestialX = canvas.width * 0.85;
        if (t >= 0.5) {
          // Sun (daytime)
          const sunAlpha = Math.min(1, (t - 0.5) * 4);
          ctx.save();
          ctx.globalAlpha = sunAlpha;
          ctx.fillStyle = '#FFD700';
          ctx.beginPath();
          ctx.arc(celestialX, canvas.height * 0.15, 28, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = 'rgba(255,220,0,0.35)';
          ctx.beginPath();
          ctx.arc(celestialX, canvas.height * 0.15, 42, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        } else {
          // Moon (nighttime)
          const moonAlpha = Math.min(1, (0.5 - t) * 4);
          ctx.save();
          ctx.globalAlpha = moonAlpha;
          ctx.fillStyle = '#FFFDE7';
          ctx.beginPath();
          ctx.arc(celestialX, canvas.height * 0.15, 22, 0, Math.PI * 2);
          ctx.fill();
          // Crater detail
          ctx.fillStyle = 'rgba(200,200,160,0.5)';
          ctx.beginPath();
          ctx.arc(celestialX + 6, canvas.height * 0.15 - 5, 5, 0, Math.PI * 2);
          ctx.fill();
          ctx.beginPath();
          ctx.arc(celestialX - 7, canvas.height * 0.15 + 6, 3, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }

        // --- Feature 7: Parallax — distant mountains ---
        if (gameRunning) parallaxOffset1 = (parallaxOffset1 + 0.3) % canvas.width;
        const mtnY = canvas.height - GROUND_HEIGHT - 120;
        ctx.fillStyle = `rgba(100,140,100,${0.3 + t * 0.3})`;
        for (let i = -1; i <= 2; i++) {
          const bx = (i * canvas.width - parallaxOffset1 + canvas.width) % (canvas.width * 2) - canvas.width * 0.5;
          ctx.beginPath();
          ctx.moveTo(bx, canvas.height - GROUND_HEIGHT);
          ctx.lineTo(bx + canvas.width * 0.25, mtnY);
          ctx.lineTo(bx + canvas.width * 0.5, canvas.height - GROUND_HEIGHT);
          ctx.fill();
        }

        // --- Feature 7: Parallax — mid-ground bushes ---
        if (gameRunning) parallaxOffset2 = (parallaxOffset2 + 0.8) % 200;
        ctx.fillStyle = `rgba(60,120,60,${0.5 + t * 0.3})`;
        for (let bx = -parallaxOffset2; bx < canvas.width + 200; bx += 200) {
          ctx.beginPath();
          ctx.arc(bx + 30, canvas.height - GROUND_HEIGHT, 25, Math.PI, 0);
          ctx.arc(bx + 55, canvas.height - GROUND_HEIGHT, 35, Math.PI, 0);
          ctx.arc(bx + 80, canvas.height - GROUND_HEIGHT, 25, Math.PI, 0);
          ctx.fill();
        }

        // Clouds
        clouds.forEach(cloud => {
          cloud.x -= cloud.speed;
          if (cloud.x < -150) {
            cloud.x = canvas.width + 50;
            cloud.y = Math.random() * canvas.height * 0.5;
          }
          ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
          ctx.beginPath();
          ctx.arc(cloud.x, cloud.y, 40 * cloud.size, 0, Math.PI * 2);
          ctx.arc(cloud.x + 30, cloud.y - 10, 30 * cloud.size, 0, Math.PI * 2);
          ctx.arc(cloud.x + 60, cloud.y, 40 * cloud.size, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      // --- Feature 12: Animated ground with grass blades ---
      // --- Feature 22: Ground texture scrolling ---
      let grassTimer = 0;
      function drawGround() {
        grassTimer += 0.03;
        if (gameRunning) groundOffset = (groundOffset + pipeSpeed * 0.6) % 36;
        ctx.fillStyle = '#DED895';
        ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, GROUND_HEIGHT);
        ctx.fillStyle = '#755C48';
        ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, 20);
        // Scrolling dirt stripe
        ctx.fillStyle = 'rgba(100,70,40,0.25)';
        for (let dx = -groundOffset; dx < canvas.width + 36; dx += 36) {
          ctx.fillRect(dx, canvas.height - GROUND_HEIGHT, 18, 6);
        }
        // Grass blades
        const bladeSpacing = 18;
        const groundTop = canvas.height - GROUND_HEIGHT;
        for (let gx = 0; gx < canvas.width; gx += bladeSpacing) {
          const sway = Math.sin(grassTimer + gx * 0.1) * 4;
          const h = 10 + Math.sin(gx * 0.3) * 3;
          ctx.fillStyle = '#4a9e2f';
          ctx.beginPath();
          ctx.moveTo(gx - 3, groundTop);
          ctx.lineTo(gx + sway, groundTop - h);
          ctx.lineTo(gx + 3, groundTop);
          ctx.closePath();
          ctx.fill();
        }
      }

      // --- Feature 16: Bird Ground Shadow (projected onto ground) ---
      function drawBirdGroundShadow() {
        const groundY = canvas.height - GROUND_HEIGHT;
        // Visual y of bird = game y + cameraOffsetY (bird drawn inside camera transform)
        const visualBirdY = bird.y + cameraOffsetY;
        const distanceFromGround = Math.max(0, groundY - visualBirdY);
        const maxDist = groundY * 0.75;
        const ratio = Math.min(1, distanceFromGround / maxDist);
        const shadowW = 28 * (1 - ratio * 0.65);
        const shadowH = 7 * (1 - ratio * 0.65);
        const shadowAlpha = 0.45 * (1 - ratio * 0.82);
        if (shadowAlpha <= 0.01) return;
        ctx.save();
        ctx.globalAlpha = shadowAlpha;
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.ellipse(bird.x, groundY - 4, shadowW, shadowH, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
  
      let clouds = [
        {x: canvas.width * 0.2, y: canvas.height * 0.2, speed: 0.3, size: 1.0},
        {x: canvas.width * 0.7, y: canvas.height * 0.3, speed: 0.5, size: 1.2},
        {x: canvas.width * 0.4, y: canvas.height * 0.15, speed: 0.2, size: 0.7}
      ];
  
      function spawnParticles(x, y) {
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          particles.push({
            x: x,
            y: y,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5,
            radius: Math.random() * 3 + 2,
            alpha: 1,
          });
        }
      }
  
      function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
          let p = particles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.alpha -= PARTICLE_FADE_RATE * dt;
          if (
            p.alpha <= 0.05 ||
            (p.x + p.radius < 0) ||
            (p.x - p.radius > canvas.width) ||
            (p.y + p.radius < 0) ||
            (p.y - p.radius > canvas.height)
          ) {
            particles.splice(i, 1);
          }
        }
      }
  
      function drawParticles() {
        particles.forEach(p => {
          if (p.alpha < 0.05) return;
          ctx.fillStyle = `rgba(255, 255, 255, ${p.alpha})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
        });
      }

      // --- Feature 8: Dragon fire breathing ---
      const FIRE_COLORS = ['#FF4500', '#FF8C00', '#FFD700', '#FF6347'];
      function spawnFireParticles(x, y) {
        for (let i = 0; i < 12; i++) {
          fireParticles.push({
            x, y,
            vx: Math.random() * 4 + 1,
            vy: (Math.random() - 0.5) * 2,
            radius: Math.random() * 4 + 2,
            alpha: 1,
            color: FIRE_COLORS[Math.floor(Math.random() * FIRE_COLORS.length)]
          });
        }
      }

      function updateFireParticles(dt) {
        for (let i = fireParticles.length - 1; i >= 0; i--) {
          const p = fireParticles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.alpha -= 0.06 * dt;
          p.radius *= 0.97;
          if (p.alpha <= 0.05) fireParticles.splice(i, 1);
        }
      }

      function drawFireParticles() {
        fireParticles.forEach(p => {
          if (p.alpha < 0.05) return;
          ctx.globalAlpha = p.alpha;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
      }

      // --- Feature 6: Floating score popups ---
      function updateScorePopups(dt) {
        for (let i = scorePopups.length - 1; i >= 0; i--) {
          const p = scorePopups[i];
          p.y += p.vy * dt;
          p.alpha -= 0.025 * dt;
          if (p.alpha <= 0) scorePopups.splice(i, 1);
        }
      }

      function drawScorePopups() {
        scorePopups.forEach(p => {
          ctx.globalAlpha = Math.max(0, p.alpha);
          ctx.fillStyle = '#FFD700';
          ctx.font = 'bold 22px Arial';
          ctx.textAlign = 'center';
          ctx.fillText(p.text, p.x, p.y);
        });
        ctx.globalAlpha = 1;
        ctx.textAlign = 'left';
      }

      // --- Feature 5: Ghost trail drawing ---
      function drawGhostTrail() {
        if (bestRunPositions.length === 0) return;
        const frameIndex = Math.min(
          Math.floor((Date.now() - gameStartTime) / (1000 / 60)),
          bestRunPositions.length - 1
        );
        if (frameIndex < 0) return;
        const ghostY = bestRunPositions[frameIndex];
        // Save/restore to isolate ghost drawing state (already in camera transform)
        ctx.save();
        const savedY = bird.y;
        const savedVel = bird.velocity;
        bird.y = ghostY;
        bird.velocity = 0;
        bird.draw(true);
        bird.y = savedY;
        bird.velocity = savedVel;
        ctx.restore();
      }

      let gameStartTime = 0;
  
      function gameLoop(timestamp) {
        if (!timestamp) timestamp = performance.now();
        const elapsed = timestamp - lastFrameTime;
        lastFrameTime = timestamp;
        // Normalize dt to 60fps (16.67ms per frame); clamp to MAX_DT_MULTIPLIER
        const dt = Math.min(elapsed / TARGET_FRAME_MS, MAX_DT_MULTIPLIER);

        // --- Feature 14: FPS ---
        if (elapsed > 0) {
          fpsValue = Math.round(1000 / elapsed);
          if (showFPS) fpsCounter.innerText = `FPS: ${fpsValue}`;
        }

        // --- Feature 2: Wing timer ---
        wingTimer += dt;

        // --- Feature 1: Screen shake offset ---
        let shakeX = 0, shakeY = 0;
        if (shakeTimer > 0) {
          shakeTimer -= elapsed;
          const intensity = shakeIntensity * (shakeTimer / SHAKE_DURATION);
          shakeX = (Math.random() - 0.5) * intensity * 2;
          shakeY = (Math.random() - 0.5) * intensity * 2;
        }

        // --- Feature 10: Smooth camera follow ---
        const targetOffsetY = -(bird.y - canvas.height / 2) * 0.1;
        cameraOffsetY += (targetOffsetY - cameraOffsetY) * 0.05 * dt;
        // Clamp so we don't scroll into the ground
        cameraOffsetY = Math.max(Math.min(cameraOffsetY, canvas.height * 0.15), -canvas.height * 0.15);

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        ctx.translate(shakeX, shakeY);

        drawBackground();

        ctx.save();
        ctx.translate(0, cameraOffsetY);

        if (!paused) {
          if (gameRunning) {
            // --- Feature 5: Record current run positions ---
            currentRunPositions.push(bird.y);

            spawnPipe();
            for (let i = pipes.length - 1; i >= 0; i--) {
              pipes[i].update(dt);
              pipes[i].draw();
              if (pipes[i].x + pipes[i].width < 0) {
                pipes.splice(i, 1);
              }
            }
            bird.update(dt);
          }
        }

        // --- Feature 5: Draw ghost trail ---
        if (gameRunning) drawGhostTrail();

        bird.draw(false);
        ctx.restore(); // pop camera transform

        // --- Feature 16: Bird ground shadow (drawn before ground so ground overlaps edges) ---
        drawBirdGroundShadow();

        drawGround();

        updateParticles(dt);
        drawParticles();
        updateFireParticles(dt);
        drawFireParticles();
        // --- Feature 23: Speed lines ---
        updateSpeedLines(dt);
        drawSpeedLines();
        updateScorePopups(dt);
        drawScorePopups();
        // --- Feature 24: Confetti ---
        updateConfetti(dt);
        drawConfetti();

        ctx.restore(); // pop shake transform
        requestAnimationFrame(gameLoop);
      }
  
      function getLeaderboard() {
        try {
          const board = localStorage.getItem('leaderboard');
          return board ? JSON.parse(board) : [];
        } catch (e) {
          return [];
        }
      }
  
      function setLeaderboard(board) {
        try {
          localStorage.setItem('leaderboard', JSON.stringify(board));
        } catch (e) {
          // Storage unavailable
        }
      }
  
      function updateLeaderboardDisplay() {
        const board = getLeaderboard();
        board.sort((a, b) => b.score - a.score);
        const top10 = board.slice(0, LEADERBOARD_MAX_ENTRIES);
        leaderboardList.innerHTML = '';
        top10.forEach((entry, index) => {
          const div = document.createElement('div');
          div.textContent = `${entry.name}: ${entry.score}`;
          if (index === 0) {
            div.style.color = 'gold';
            div.style.fontWeight = 'bold';
          }
          leaderboardList.appendChild(div);
        });
      }
  
      function addScoreToLeaderboard() {
        if (score <= 0) return;
        nameInputModal.classList.add('visible');
        playerNameInput.value = '';
        playerNameInput.focus();
      }

      function submitLeaderboardEntry(playerName) {
        nameInputModal.classList.remove('visible');
        if (playerName) {
          const board = getLeaderboard();
          board.push({ name: playerName, score: score });
          board.sort((a, b) => b.score - a.score);
          board.splice(LEADERBOARD_MAX_ENTRIES);
          setLeaderboard(board);
          updateLeaderboardDisplay();
        }
      }

      nameSubmitBtn.addEventListener('click', () => {
        const name = playerNameInput.value.trim();
        submitLeaderboardEntry(name || DEFAULT_PLAYER_NAME);
      });

      nameSkipBtn.addEventListener('click', () => {
        nameInputModal.classList.remove('visible');
      });

      playerNameInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          const name = playerNameInput.value.trim();
          submitLeaderboardEntry(name || DEFAULT_PLAYER_NAME);
        }
      });
  
      function spawnPipe() {
        if (!gameRunning) return;
        const currentTime = Date.now();
        if (currentTime - lastPipeTime > pipeSpawnRate) {
          pipes.push(new Pipe(canvas.width));
          lastPipeTime = currentTime;
        }
      }
  
      function startCountdown() {
        if (countdownActive) return;
        countdownActive = true;
        gameOverMessage.style.display = 'none';
        nameInputModal.classList.remove('visible');
        document.getElementById('difficulty-selection').style.display = 'none';
        document.getElementById('mode-selection').style.display = 'none';
        document.getElementById('skin-selection').style.display = 'none';
        startMessage.style.display = 'block';
        let countdown = COUNTDOWN_SECONDS;
        startMessage.innerText = countdown;
        const countdownInterval = setInterval(() => {
          countdown--;
          if (countdown > 0) {
            startMessage.innerText = countdown;
          } else {
            clearInterval(countdownInterval);
            startGame();
          }
        }, 1000);
      }
  
      function startGame() {
        gameStarted = true;
        gameRunning = true;
        countdownActive = false;
        score = 0;
        scoreDisplay.innerText = score;
        startMessage.style.display = 'none';
        gameOverMessage.style.display = 'none';
        document.getElementById('bottom-controls').style.display = 'none';
        bird.y = canvas.height / 2;
        bird.velocity = 0;
        pipes.length = 0;
        particles.length = 0;
        scorePopups.length = 0;
        fireParticles.length = 0;
        confettiParticles.length = 0;
        speedLines.length = 0;
        unlockedAchievements.clear();
        comboCount = 0;
        comboDisplay.innerText = '';
        currentRunPositions = [];
        gameStartTime = Date.now();
        updateGameParameters();
        lastPipeTime = Date.now();
        lastFrameTime = performance.now();
      }
  
      // --- Feature 13: Medal system ---
      function getMedal(s) {
        if (s >= 100) return { label: 'Platinum', color: '#E5E4E2', glow: '#fff' };
        if (s >= 50)  return { label: 'Gold',     color: '#FFD700', glow: '#ffa500' };
        if (s >= 25)  return { label: 'Silver',   color: '#C0C0C0', glow: '#aaa' };
        if (s >= 10)  return { label: 'Bronze',   color: '#CD7F32', glow: '#8B4513' };
        return null;
      }

      function updateHighScore() {
        if (score > highScore) {
          highScore = score;
          try {
            localStorage.setItem('highScore', highScore);
          } catch (e) {
            // Storage unavailable
          }
          finalScore.innerText = `Score: ${score} (New High Score!)`;
          highScoreDisplay.innerText = `High Score: ${highScore}`;
        } else {
          finalScore.innerText = `Score: ${score}`;
          highScoreDisplay.innerText = `High Score: ${highScore}`;
        }
      }

      function gameOver() {
        if (!gameRunning) return;
        gameRunning = false;

        // --- Feature 1: Trigger screen shake ---
        shakeTimer = SHAKE_DURATION;
        shakeIntensity = SHAKE_MAX_INTENSITY;

        // --- Feature 5: Save best run if this is better ---
        const isNewHighScore = score > highScore;
        if (score >= highScore && currentRunPositions.length > 0) {
          bestRunPositions = currentRunPositions.slice();
        }

        // --- Feature 15: Update stats ---
        statsData.totalGames++;
        statsData.totalScore += score;
        if (score > statsData.bestStreak) statsData.bestStreak = score;
        saveStats();

        updateHighScore();
        gameOverMessage.style.display = 'block';

        // --- Feature 13: Show medal ---
        const medal = getMedal(score);
        const medalDisplay = document.getElementById('medal-display');
        medalDisplay.innerHTML = '';
        if (medal) {
          const span = document.createElement('span');
          span.style.cssText = `display:inline-block;background:${medal.color};color:#222;font-weight:bold;padding:4px 14px;border-radius:20px;box-shadow:0 0 8px ${medal.glow};margin-bottom:4px;`;
          span.textContent = `🏅 ${medal.label}`;
          medalDisplay.appendChild(span);
        }

        // --- Feature 15: Show stats ---
        const statsEl = document.getElementById('stats-display');
        statsEl.innerHTML = `Games: ${statsData.totalGames} | Total Score: ${statsData.totalScore} | Best: ${statsData.bestStreak}`;

        // Reset combo display
        comboDisplay.innerText = '';

        playGameOverSound();
        addScoreToLeaderboard();
        document.getElementById('bottom-controls').style.display = 'flex';
        document.getElementById('difficulty-selection').style.display = 'block';
        document.getElementById('mode-selection').style.display = 'block';
        document.getElementById('skin-selection').style.display = 'block';
        startHighScore.innerText = highScore > 0 ? `High Score: ${highScore}` : '';
        spawnParticles(bird.x, bird.y + cameraOffsetY);
        // --- Feature 24: Celebrate new high score with confetti ---
        if (isNewHighScore && score > 0) spawnConfetti();
      }
  
      canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!gameStarted && !countdownActive) {
          startCountdown();
        } else if (gameRunning && !paused) {
          bird.flap();
        }
      });
  
      canvas.addEventListener('click', () => {
        if (!gameStarted && !countdownActive) {
          startCountdown();
        } else if (gameRunning && !paused) {
          bird.flap();
        }
      });
  
      restartButton.addEventListener('click', startCountdown);
  
      pauseButton.addEventListener('click', () => {
        paused = !paused;
        pauseButton.innerText = paused ? 'Resume' : 'Pause';
      });
  
      document.addEventListener('keydown', (e) => {
        if (e.code === 'Space') {
          e.preventDefault();
          paused = !paused;
          pauseButton.innerText = paused ? 'Resume' : 'Pause';
        }
        if (e.code === 'ArrowUp' || e.code === 'KeyW') {
          e.preventDefault();
          if (!gameStarted && !countdownActive) {
            startCountdown();
          } else if (gameRunning && !paused) {
            bird.flap();
          }
        }
        if (e.code === 'KeyM') {
          muted = !muted;
          muteButton.innerText = muted ? '🔇' : '🔊';
        }
        // --- Feature 14: FPS toggle ---
        if (e.code === 'KeyF') {
          showFPS = !showFPS;
          fpsCounter.style.display = showFPS ? 'block' : 'none';
        }
      });

      muteButton.addEventListener('click', () => {
        muted = !muted;
        muteButton.innerText = muted ? '🔇' : '🔊';
      });
  
      function setupButtonGroup(buttons, callback) {
        buttons.forEach(({el, value}) => {
          el.addEventListener('click', () => {
            buttons.forEach(b => b.el.classList.remove('selected'));
            el.classList.add('selected');
            callback(value);
          });
        });
      }

      setupButtonGroup(
        [{el: classicBtn, value: 'Classic'}, {el: challengeBtn, value: 'Challenge'}],
        (value) => { gameMode = value; }
      );

      setupButtonGroup(
        [{el: easyBtn, value: 'Easy'}, {el: mediumBtn, value: 'Medium'}, {el: hardBtn, value: 'Hard'}],
        (value) => { selectedDifficulty = difficulties[value]; }
      );

      setupButtonGroup(
        [{el: redSkinBtn, value: 'red'}, {el: blueSkinBtn, value: 'blue'}, {el: greenSkinBtn, value: 'green'}, {el: pinkSkinBtn, value: 'pink'}, {el: goldSkinBtn, value: 'gold'}, {el: silverSkinBtn, value: 'silver'}],
        (value) => { selectedSkin = value; }
      );
  
      document.getElementById('share-button').addEventListener('click', async () => {
        const shareText = `I scored ${score} in Dragon Flight, and my high score is ${highScore}! Can you beat me?`;
        if (navigator.share) {
          try {
            await navigator.share({
              title: 'Dragon Flight Challenge!',
              text: shareText,
              url: 'https://14spartan117.github.io/Flappy-Birds/'
            });
          } catch (err) {
            if (err.name !== 'AbortError') {
              if (navigator.clipboard) {
                await navigator.clipboard.writeText(shareText + " Play now at: https://14spartan117.github.io/Flappy-Birds/");
                alert("Share message copied to clipboard!");
              } else {
                alert("Sharing not supported.");
              }
            }
          }
        } else if (navigator.clipboard) {
          navigator.clipboard.writeText(shareText + " Play now at: https://14spartan117.github.io/Flappy-Birds/").then(() => {
            alert("Share message copied to clipboard!");
          });
        } else {
          alert("Sharing not supported.");
        }
      });
  
      startHighScore.innerText = highScore > 0 ? `High Score: ${highScore}` : '';
      updateLeaderboardDisplay();
      gameLoop();
    });
  </script>
</body>
</html>
